<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Litex Dataset Review</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #636a70;
      --line: #d7d9dc;
      --blue: #2b5fab;
      --green: #237a4b;
      --yellow: #9a6500;
      --red: #b43a36;
      --violet: #6d4aa2;
      --chip: #edf1f5;
      --focus: #0f6fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .topbar {
      display: grid;
      gap: 12px;
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px 20px 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbfa;
      padding: 10px 12px;
    }

    .metric .value {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
    }

    .metric .label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 460px);
      gap: 0;
      max-width: 1500px;
      margin: 0 auto;
      min-height: calc(100vh - 145px);
    }

    .left, .right {
      min-width: 0;
      padding: 16px 20px 24px;
    }

    .right {
      border-left: 1px solid var(--line);
      background: #fbfbfa;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 2fr) repeat(3, minmax(130px, 1fr)) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .result-count {
      min-height: 20px;
      margin: -4px 0 8px;
      color: var(--muted);
      font-size: 12px;
    }

    input, select, button, textarea {
      font: inherit;
      letter-spacing: 0;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 7px 9px;
    }

    input:focus, select:focus, button:focus, textarea:focus {
      outline: 2px solid var(--focus);
      outline-offset: 1px;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { border-color: #aeb4ba; }

    .load {
      display: none;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      max-height: calc(100vh - 270px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f2f3f3;
      color: #3d4247;
      font-size: 12px;
      font-weight: 700;
    }

    tr {
      cursor: pointer;
    }

    tr:hover td, tr.active td {
      background: #f4f7fb;
    }

    .col-id { width: 190px; }
    .col-status { width: 105px; }
    .col-task { width: 150px; }
    .col-topic { width: 150px; }
    .col-problem { width: auto; }

    .truncate {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      background: var(--chip);
      color: #3f4650;
      white-space: nowrap;
    }

    .status-checkable { background: #e3f3ea; color: var(--green); }
    .status-translated { background: #e8eef9; color: var(--blue); }
    .status-blocked { background: #fdeaea; color: var(--red); }
    .status-missing { background: #fff2d7; color: var(--yellow); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .detail-head {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .detail-id {
      font-size: 18px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }

    .section h2 {
      margin: 0 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.45;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel);
      color: #1f2933;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      .right {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters input {
        grid-column: 1 / -1;
      }

      .table-wrap {
        max-height: 55vh;
      }
    }

    @media (max-width: 640px) {
      .topbar, .left, .right {
        padding-left: 12px;
        padding-right: 12px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .col-topic {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1 id="title">Litex Dataset Review</h1>
        <div class="meta" id="meta"></div>
      </div>
      <div class="summary" id="summary"></div>
    </div>
  </header>

  <main>
    <section class="left">
      <div class="load" id="loadBox">
        <span>Load current_data.json</span>
        <input type="file" id="fileInput" accept="application/json,.json">
      </div>
      <div class="filters">
        <input id="search" type="search" placeholder="Search id, topic, problem, notes">
        <select id="statusFilter" title="Status"></select>
        <select id="taskFilter" title="Contributor task"></select>
        <select id="flagFilter" title="Flag"></select>
        <button id="resetButton" type="button">Reset</button>
      </div>
      <div class="result-count" id="resultCount"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-id">Item</th>
              <th class="col-status">Status</th>
              <th class="col-task">Task</th>
              <th class="col-topic">Topic</th>
              <th class="col-problem">Problem</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="emptyState">No items loaded.</div>
      </div>
    </section>

    <aside class="right">
      <div id="detail"></div>
    </aside>
  </main>

  <script>
    const state = {
      data: null,
      items: [],
      filtered: [],
      selectedId: null
    };

    const statusOrder = ["blocked", "missing", "translated", "checkable"];

    const el = (id) => document.getElementById(id);

    function countBy(items, getter) {
      const result = {};
      for (const item of items) {
        const value = getter(item);
        if (Array.isArray(value)) {
          for (const key of value) result[key] = (result[key] || 0) + 1;
        } else if (value) {
          result[value] = (result[value] || 0) + 1;
        }
      }
      return result;
    }

    function optionList(values, label) {
      const options = [`<option value="">${label}</option>`];
      for (const value of values) {
        options.push(`<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`);
      }
      return options.join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function summarize() {
      const data = state.data || {};
      const summary = data.summary || {};
      const statusCounts = summary.by_status || countBy(state.items, (item) => item.status);
      const metricDefs = [
        ["total_items", "Total"],
        ["checkable", "Checkable"],
        ["translated", "Translated"],
        ["blocked", "Blocked"],
        ["missing", "Missing"],
        ["needs_review", "Needs Review"]
      ];
      el("summary").innerHTML = metricDefs.map(([key, label]) => {
        const value = key in summary ? summary[key] : (statusCounts[key] || 0);
        return `<div class="metric"><span class="value">${escapeHtml(value)}</span><span class="label">${label}</span></div>`;
      }).join("");
    }

    function configure(data) {
      state.data = data;
      state.items = Array.isArray(data.items) ? data.items : [];
      state.filtered = state.items;
      const dataset = data.dataset || {};
      el("title").textContent = dataset.title || dataset.id || "Litex Dataset Review";
      el("meta").innerHTML = [
        data.generated_at ? `generated ${escapeHtml(data.generated_at)}` : "",
        data.schema_version ? escapeHtml(data.schema_version) : "",
        dataset.repository ? escapeHtml(dataset.repository) : ""
      ].filter(Boolean).map((value) => `<span>${value}</span>`).join("");

      const statuses = [...new Set(state.items.map((item) => item.status).filter(Boolean))]
        .sort((a, b) => statusOrder.indexOf(a) - statusOrder.indexOf(b));
      const tasks = Object.keys(countBy(state.items, (item) => item.contributor_task)).sort();
      const flags = Object.keys(countBy(state.items, (item) => item.flags || [])).sort();

      el("statusFilter").innerHTML = optionList(statuses, "All statuses");
      el("taskFilter").innerHTML = optionList(tasks, "All tasks");
      el("flagFilter").innerHTML = optionList(flags, "All flags");
      summarize();
      applyFilters();
    }

    function applyFilters() {
      const q = el("search").value.trim().toLowerCase();
      const status = el("statusFilter").value;
      const task = el("taskFilter").value;
      const flag = el("flagFilter").value;
      state.filtered = state.items.filter((item) => {
        if (status && item.status !== status) return false;
        if (task && item.contributor_task !== task) return false;
        if (flag && !(item.flags || []).includes(flag)) return false;
        if (!q) return true;
        const haystack = [
          item.id,
          item.topic,
          item.difficulty,
          item.problem,
          item.answer,
          item.notes,
          item.blocker,
          item.contributor_task
        ].join("\n").toLowerCase();
        return haystack.includes(q);
      });
      renderRows();
      if (!state.filtered.some((item) => item.id === state.selectedId)) {
        state.selectedId = state.filtered[0]?.id || null;
      }
      renderDetail();
    }

    function renderRows() {
      const rows = el("rows");
      const visible = state.filtered.slice(0, 1000);
      el("resultCount").textContent = `Showing ${visible.length} of ${state.filtered.length} items`;
      rows.innerHTML = visible.map((item) => `
        <tr data-id="${escapeHtml(item.id)}" class="${item.id === state.selectedId ? "active" : ""}">
          <td class="col-id">${escapeHtml(item.id)}</td>
          <td class="col-status"><span class="pill status-${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
          <td class="col-task">${escapeHtml(item.contributor_task || "")}</td>
          <td class="col-topic">${escapeHtml(item.topic || "")}</td>
          <td class="col-problem"><div class="truncate">${escapeHtml(item.problem || item.natural_language_idea || "")}</div></td>
        </tr>
      `).join("");
      el("emptyState").style.display = state.filtered.length ? "none" : "block";
      rows.querySelectorAll("tr").forEach((row) => {
        row.addEventListener("click", () => {
          state.selectedId = row.dataset.id;
          renderRows();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const item = state.items.find((entry) => entry.id === state.selectedId);
      const detail = el("detail");
      if (!item) {
        detail.innerHTML = '<div class="empty">Select an item.</div>';
        return;
      }

      const issueTitle = `[${state.data.dataset?.id || "dataset"}] ${item.id}: ${item.contributor_task || item.status}`;
      const paths = item.paths || {};
      detail.innerHTML = `
        <div class="detail-head">
          <div class="detail-id">${escapeHtml(item.id)}</div>
          <div class="chips">
            <span class="pill status-${escapeHtml(item.status)}">${escapeHtml(item.status)}</span>
            ${escapeHtml(item.contributor_task || "") ? `<span class="pill">${escapeHtml(item.contributor_task)}</span>` : ""}
            ${(item.flags || []).map((flag) => `<span class="pill">${escapeHtml(flag)}</span>`).join("")}
          </div>
          <div class="actions">
            <button type="button" id="copyIssue">Copy Issue Title</button>
            <button type="button" id="copyId">Copy Id</button>
          </div>
        </div>
        ${section("Problem", item.problem)}
        ${section("Answer", item.answer)}
        ${section("Natural Idea", item.natural_language_idea)}
        ${section("Blocker", item.blocker)}
        ${section("Notes", item.notes)}
        ${section("Paths", Object.entries(paths).map(([key, value]) => `${key}: ${value}`).join("\\n"))}
        <div class="section">
          <h2>Litex Code</h2>
          <textarea readonly>${escapeHtml(item.litex_code || "")}</textarea>
        </div>
      `;

      el("copyIssue").addEventListener("click", () => copyText(issueTitle));
      el("copyId").addEventListener("click", () => copyText(item.id));
    }

    function section(title, value) {
      if (!value) return "";
      return `<div class="section"><h2>${escapeHtml(title)}</h2><div class="text">${escapeHtml(value)}</div></div>`;
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value || "");
      } catch {
        const area = document.createElement("textarea");
        area.value = value || "";
        document.body.append(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    async function boot() {
      el("search").addEventListener("input", applyFilters);
      el("statusFilter").addEventListener("change", applyFilters);
      el("taskFilter").addEventListener("change", applyFilters);
      el("flagFilter").addEventListener("change", applyFilters);
      el("resetButton").addEventListener("click", () => {
        el("search").value = "";
        el("statusFilter").value = "";
        el("taskFilter").value = "";
        el("flagFilter").value = "";
        applyFilters();
      });
      el("fileInput").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        configure(JSON.parse(await file.text()));
      });

      try {
        const response = await fetch("current_data.json", { cache: "no-store" });
        if (!response.ok) throw new Error(String(response.status));
        configure(await response.json());
      } catch {
        el("loadBox").style.display = "flex";
      }
    }

    boot();
  </script>
</body>
</html>
