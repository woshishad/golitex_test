name: Deploy

on:
  push:
    tags:
      - "[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate tag
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-beta* || "$VERSION" == *-alpha* || "$VERSION" == *-rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.version.outputs.version }} does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 2: Build binaries for all platforms
  # ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os_name }}-${{ matrix.arch }}
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os_name: linux
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os_name: linux
            arch: arm64
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            os_name: darwin
            arch: arm64
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os_name: windows
            arch: amd64
            cross: false
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: matrix.os_name != 'windows'
        run: |
          cp target/${{ matrix.target }}/release/litex litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}

      - name: Package archive with std (unix)
        if: matrix.os_name != 'windows'
        run: |
          PKG_DIR="package_litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}"
          mkdir -p "${PKG_DIR}"
          cp "litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}" "${PKG_DIR}/litex"
          chmod 755 "${PKG_DIR}/litex"
          cp -R std "${PKG_DIR}/std"
          tar -czf "litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.tar.gz" -C "${PKG_DIR}" .

      - name: Rename binary (windows)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/litex.exe litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.exe

      - name: Package archive with std (windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $pkgDir = "package_litex_${env:VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $pkgDir "std") | Out-Null
          Copy-Item -Path "litex_${env:VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.exe" -Destination (Join-Path $pkgDir "litex.exe")
          Copy-Item -Path (Join-Path "std" "*") -Destination (Join-Path $pkgDir "std") -Recurse
          Compress-Archive -Path (Join-Path $pkgDir "*") -DestinationPath "litex_${env:VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.zip" -Force

      - name: Smoke test archive with std (linux amd64)
        if: matrix.os_name == 'linux' && matrix.arch == 'amd64'
        run: |
          SMOKE_DIR="smoke_litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}"
          mkdir -p "${SMOKE_DIR}"
          tar -xzf "litex_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.tar.gz" -C "${SMOKE_DIR}"
          OUTPUT=$("${SMOKE_DIR}/litex" -e $'import Trig\nTrig::sin(0) = 0')
          if printf '%s\n' "${OUTPUT}" | grep -F '"result": "error"' > /dev/null || ! printf '%s\n' "${OUTPUT}" | grep -F 'Trig::sin(0) = 0' > /dev/null; then
            printf '%s\n' "${OUTPUT}"
            exit 1
          fi

      - name: Smoke test archive with std (windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $smokeDir = "smoke_litex_${env:VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          Expand-Archive -Path "litex_${env:VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}.zip" -DestinationPath $smokeDir -Force
          $output = & (Join-Path $smokeDir "litex.exe") -e "import Trig`nTrig::sin(0) = 0"
          $outputText = $output -join "`n"
          if ($outputText.Contains('"result": "error"') -or -not $outputText.Contains('Trig::sin(0) = 0')) {
              $outputText
              throw "std smoke test failed"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os_name }}-${{ matrix.arch }}
          path: litex_${{ env.VERSION }}_*

  # ─────────────────────────────────────────────
  # Job 3: Package .deb files
  # ─────────────────────────────────────────────
  package-deb:
    name: Package .deb (${{ matrix.arch }})
    needs: [validate, build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            deb_arch: amd64
          - arch: arm64
            deb_arch: arm64
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}

      - name: Build .deb
        run: |
          PKG_DIR="pkg_litex_${VERSION}_${{ matrix.deb_arch }}"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/local/bin"
          mkdir -p "${PKG_DIR}/usr/share/litex"

          sed -e "s/{{VERSION}}/${VERSION}/" \
              -e "s/{{ARCH}}/${{ matrix.deb_arch }}/" \
              dist/deb/control.template > "${PKG_DIR}/DEBIAN/control"

          cp "litex_${VERSION}_linux_${{ matrix.arch }}" "${PKG_DIR}/usr/local/bin/litex"
          chmod 755 "${PKG_DIR}/usr/local/bin/litex"
          cp -R std "${PKG_DIR}/usr/share/litex/std"

          dpkg-deb --build "${PKG_DIR}" "litex_${VERSION}_${{ matrix.deb_arch }}.deb"

      - name: Smoke test .deb with std (amd64)
        if: matrix.arch == 'amd64'
        run: |
          sudo dpkg -i "litex_${VERSION}_${{ matrix.deb_arch }}.deb"
          OUTPUT=$(litex -e $'import Trig\nTrig::sin(0) = 0')
          if printf '%s\n' "${OUTPUT}" | grep -F '"result": "error"' > /dev/null || ! printf '%s\n' "${OUTPUT}" | grep -F 'Trig::sin(0) = 0' > /dev/null; then
            printf '%s\n' "${OUTPUT}"
            exit 1
          fi

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: litex_${{ env.VERSION }}_${{ matrix.deb_arch }}.deb

  # ─────────────────────────────────────────────
  # Job 4: Package .msi (Windows) - optional
  # ─────────────────────────────────────────────
  package-msi:
    name: Package .msi
    needs: [validate, build]
    runs-on: windows-latest
    continue-on-error: true
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-amd64

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Init WiX
        run: cargo wix init --force
        continue-on-error: true

      - name: Build .msi
        shell: bash
        run: |
          WIX_VERSION=$(echo "${VERSION}" | sed 's/-.*//')
          mkdir -p target/release
          cp "litex_${VERSION}_windows_amd64.exe" target/release/litex.exe
          cargo wix --no-build --nocapture -o "litex_${VERSION}_amd64.msi" --install-version "${WIX_VERSION}"

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: litex_${{ env.VERSION }}_amd64.msi

  # ─────────────────────────────────────────────
  # Job 5: Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [validate, build, package-deb]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: true

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body: "Release of litex version ${{ env.VERSION }}"
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*

  # ─────────────────────────────────────────────
  # Job 6: Publish to crates.io
  # ─────────────────────────────────────────────
  publish-crates-io:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --allow-dirty --token ${{ secrets.CRATES_IO_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 7: Update Homebrew tap
  # ─────────────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew tap
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download binaries for SHA256
        run: |
          BASE_URL="https://github.com/litexlang/golitex/releases/download/${VERSION}"
          for pair in "darwin_arm64" "linux_amd64" "linux_arm64"; do
            curl -fSL -o "litex_${VERSION}_${pair}.tar.gz" "${BASE_URL}/litex_${VERSION}_${pair}.tar.gz"
          done

      - name: Compute SHA256
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum litex_${VERSION}_darwin_arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum litex_${VERSION}_linux_amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum litex_${VERSION}_linux_arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: litexlang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/litex.rb << 'FORMULA'
          class Litex < Formula
            desc "A simple formal proof language and verifier"
            homepage "https://litexlang.com"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              url "https://github.com/litexlang/golitex/releases/download/VERSION_PLACEHOLDER/litex_VERSION_PLACEHOLDER_darwin_arm64.tar.gz"
              sha256 "SHA_DARWIN_ARM64"
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/litexlang/golitex/releases/download/VERSION_PLACEHOLDER/litex_VERSION_PLACEHOLDER_linux_arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64"
              else
                url "https://github.com/litexlang/golitex/releases/download/VERSION_PLACEHOLDER/litex_VERSION_PLACEHOLDER_linux_amd64.tar.gz"
                sha256 "SHA_LINUX_AMD64"
              end
            end

            def install
              bin.install "litex"
              pkgshare.install "std"
            end

            test do
              assert_match "litex VERSION_PLACEHOLDER", shell_output("#{bin}/litex -version")
              (testpath/"test.lit").write "import Trig\nTrig::sin(0) = 0\n"
              output = shell_output("#{bin}/litex -f #{testpath}/test.lit")
              assert_match "Trig::sin(0) = 0", output
              refute_match '"result": "error"', output
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/litex.rb
          sed -i "s/SHA_DARWIN_ARM64/${{ steps.sha.outputs.darwin_arm64 }}/g" homebrew-tap/litex.rb
          sed -i "s/SHA_LINUX_AMD64/${{ steps.sha.outputs.linux_amd64 }}/g" homebrew-tap/litex.rb
          sed -i "s/SHA_LINUX_ARM64/${{ steps.sha.outputs.linux_arm64 }}/g" homebrew-tap/litex.rb

      - name: Push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add litex.rb
          git diff --cached --quiet && echo "No changes" || git commit -m "Update litex to ${VERSION}"
          git push

  # ─────────────────────────────────────────────
  # Job 8: Update Scoop bucket
  # ─────────────────────────────────────────────
  publish-scoop:
    name: Update Scoop bucket
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download Windows package for SHA256
        run: |
          curl -fSL -o "litex.zip" \
            "https://github.com/litexlang/golitex/releases/download/${VERSION}/litex_${VERSION}_windows_amd64.zip"

      - name: Compute SHA256
        id: sha
        run: |
          echo "windows_amd64=$(sha256sum litex.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout scoop bucket
        uses: actions/checkout@v4
        with:
          repository: litexlang/scoop-litex
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-litex

      - name: Update manifest
        run: |
          cat > scoop-litex/litex.json << EOF
          {
              "version": "${VERSION}",
              "description": "A simple formal proof language and verifier",
              "homepage": "https://litexlang.com",
              "license": "Apache-2.0",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/litexlang/golitex/releases/download/${VERSION}/litex_${VERSION}_windows_amd64.zip",
                      "hash": "${{ steps.sha.outputs.windows_amd64 }}"
                  }
              },
              "bin": [["litex.exe", "litex"]],
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/litexlang/golitex/releases/download/\$version/litex_\$version_windows_amd64.zip"
                      }
                  }
              }
          }
          EOF

      - name: Push to scoop bucket
        run: |
          cd scoop-litex
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add litex.json
          git commit -m "Update litex to ${VERSION}"
          git push

  # ─────────────────────────────────────────────
  # Job 9: Build and push Docker image
  # ─────────────────────────────────────────────
  publish-docker:
    name: Publish Docker image
    needs: [validate, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      PRERELEASE: ${{ needs.validate.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          merge-multiple: true

      - name: Prepare binaries for Docker
        run: |
          cp "litex_${VERSION}_linux_amd64" litex-amd64
          cp "litex_${VERSION}_linux_arm64" litex-arm64
          chmod +x litex-amd64 litex-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker tags
        id: tags
        run: |
          TAGS="ghcr.io/litexlang/litex:${VERSION}"
          if [ "$PRERELEASE" = "false" ]; then
            TAGS="${TAGS},ghcr.io/litexlang/litex:latest"
          else
            TAGS="${TAGS},ghcr.io/litexlang/litex:beta"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

  # ─────────────────────────────────────────────
  # Job 10: Deploy .deb to litexlang.com web server
  # ─────────────────────────────────────────────
  deploy-web-server:
    name: Deploy .deb to web server
    needs: [validate, package-deb, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download amd64 .deb
        run: |
          curl -fSL -o "litex.deb" \
            "https://github.com/litexlang/golitex/releases/download/${VERSION}/litex_${VERSION}_amd64.deb"

      - name: Upload amd64 .deb to litexlang.com
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WEB_DEPLOY_HOST }}
          username: ${{ secrets.WEB_DEPLOY_USER }}
          key: ${{ secrets.WEB_DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.WEB_DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.WEB_DEPLOY_PORT }}
          source: litex.deb
          target: /tmp/

      - name: Install amd64 .deb on litexlang.com
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEB_DEPLOY_HOST }}
          username: ${{ secrets.WEB_DEPLOY_USER }}
          key: ${{ secrets.WEB_DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.WEB_DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.WEB_DEPLOY_PORT }}
          script: |
            set -e
            sudo dpkg -i /tmp/litex.deb
            rm -f /tmp/litex.deb
            litex -version
