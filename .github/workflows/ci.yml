name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Clippy
        run: cargo clippy -- -W warnings

      - name: Core tests
        run: |
          cargo test --lib common::
          cargo test --lib infer::
          cargo test --lib obj::
          cargo test --lib parse::
          cargo test --lib pipeline::
          cargo test --lib rational_expression::
          cargo test --lib stmt::
          cargo test --lib verify::
